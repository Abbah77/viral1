name: Build ijkplayer arm64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Android NDK
      uses: android-actions/setup-android@v3

    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y yasm nasm gcc make git pkg-config

    - name: Setup NDK environment
      run: |
        echo "ANDROID_NDK=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

    - name: Init ijkplayer
      run: |
        cd ijk-player
        ./init-android.sh

    - name: Compile FFmpeg arm64 only
      run: |
        cd ijk-player/android/contrib
        ./compile-ffmpeg.sh arm64

    - name: Compile ijkplayer arm64
      run: |
        cd ijk-player/android/contrib
        ./compile-ijk.sh arm64

    - name: Collect .so files
      run: |
        mkdir -p output/arm64-v8a
        find ijk-player -name "*.so" -exec cp {} output/arm64-v8a/ \;
        ls -lh output/arm64-v8a/

    - name: Upload compiled libraries
      uses: actions/upload-artifact@v3
      with:
        name: ijkplayer-arm64
        path: output/
        retention-days: 30
