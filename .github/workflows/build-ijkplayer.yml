name: Build ijkplayer arm64 (Debug)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y yasm nasm gcc make git pkg-config tree

      - name: Setup Android NDK r21e
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r21e-linux-x86_64.zip
          unzip -q android-ndk-r21e-linux-x86_64.zip
          echo "ANDROID_NDK=$PWD/android-ndk-r21e" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$PWD/android-ndk-r21e" >> $GITHUB_ENV
          echo "$PWD/android-ndk-r21e" >> $GITHUB_PATH

      - name: Patch ijkplayer NDK version check
        run: |
          find ijk-player -name "*.sh" | xargs grep -l "NDKr10e" | while read f; do
            sed -i 's/You need the NDKr10e or later/NDK version ok/' "$f"
            sed -i '/NDK version ok/{ n; /exit 1/d; }' "$f"
          done

      - name: Init ijkplayer
        run: |
          cd ijk-player
          ./init-android.sh

      - name: Compile FFmpeg arm64
        env:
          ANDROID_NDK: ${{ env.ANDROID_NDK }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK }}
        run: |
          cd ijk-player/android/contrib
          ./compile-ffmpeg.sh arm64

      - name: Compile ijkplayer arm64
        env:
          ANDROID_NDK: ${{ env.ANDROID_NDK }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK }}
        run: |
          cd ijk-player/android
          ./compile-ijk.sh arm64

      - name: DEBUG - Find all .so files
        run: |
          echo "=== All .so files in ijk-player ==="
          find ijk-player -name "*.so" -type f -exec ls -lh {} \; 2>/dev/null
          
          echo "=== Directory structure ==="
          tree ijk-player/android/ijkplayer/ 2>/dev/null || find ijk-player/android/ijkplayer/ -type d
          
          echo "=== Checking specific expected locations ==="
          ls -la ijk-player/android/ijkplayer/ijkplayer-arm64-v8a/src/main/jniLibs/arm64-v8a/ 2>/dev/null || echo "Not found"
          ls -la ijk-player/android/ijkplayer/build/outputs/ 2>/dev/null || echo "Not found"
