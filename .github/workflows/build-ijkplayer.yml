name: Build ijkplayer arm64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Install build tools
      run: |
        sudo apt-get update
        sudo apt-get install -y yasm nasm gcc make git pkg-config

    - name: Setup Android NDK r21e
      run: |
        wget -q https://dl.google.com/android/repository/android-ndk-r21e-linux-x86_64.zip
        unzip -q android-ndk-r21e-linux-x86_64.zip
        echo "ANDROID_NDK=$PWD/android-ndk-r21e" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=$PWD/android-ndk-r21e" >> $GITHUB_ENV
        echo "$PWD/android-ndk-r21e" >> $GITHUB_PATH

    - name: Patch ijkplayer NDK version check
      run: |
        find ijk-player -name "*.sh" | xargs grep -l "NDKr10e" | while read f; do
          sed -i 's/You need the NDKr10e or later/NDK version ok/' "$f"
          sed -i '/NDK version ok/{ n; /exit 1/d }' "$f"
        done

    - name: Init ijkplayer
      run: |
        cd ijk-player
        ./init-android.sh

    - name: Compile FFmpeg arm64
      env:
        ANDROID_NDK: ${{ env.ANDROID_NDK }}
        ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK }}
      run: |
        cd ijk-player/android/contrib
        ./compile-ffmpeg.sh arm64

    - name: Compile ijkplayer arm64
      env:
        ANDROID_NDK: ${{ env.ANDROID_NDK }}
        ANDROID_NDK_ROOT: ${{ env.ANDROID_NDK }}
      run: |
        cd ijk-player/android
        ./compile-ijk.sh arm64

    - name: Collect .so files
      run: |
        mkdir -p output/arm64-v8a

        # Only the 3 essential .so files
        find ijk-player -name "libijkffmpeg.so" -exec cp {} output/arm64-v8a/ \;
        find ijk-player -name "libijkplayer.so" -exec cp {} output/arm64-v8a/ \;
        find ijk-player -name "libijksdl.so" -exec cp {} output/arm64-v8a/ \;

        echo "=== Final .so files ==="
        ls -lh output/arm64-v8a/
        du -sh output/

    - name: Upload compiled libraries
      uses: actions/upload-artifact@v4
      with:
        name: ijkplayer-arm64
        path: output/
        retention-days: 30
