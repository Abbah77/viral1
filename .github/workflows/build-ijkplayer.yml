name: Find all .so files (Debug)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y yasm nasm gcc make git pkg-config tree

      - name: Setup Android NDK r21e
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r21e-linux-x86_64.zip
          unzip -q android-ndk-r21e-linux-x86_64.zip
          echo "ANDROID_NDK=$PWD/android-ndk-r21e" >> $GITHUB_ENV
          echo "ANDROID_NDK_ROOT=$PWD/android-ndk-r21e" >> $GITHUB_ENV

      - name: Patch ijkplayer NDK version check
        run: |
          find ijk-player -name "*.sh" | xargs grep -l "NDKr10e" | while read f; do
            sed -i 's/You need the NDKr10e or later/NDK version ok/' "$f"
            sed -i '/NDK version ok/{ n; /exit 1/d; }' "$f"
          done

      - name: Init ijkplayer
        run: |
          cd ijk-player
          ./init-android.sh

      - name: Compile FFmpeg arm64
        run: |
          cd ijk-player/android/contrib
          ./compile-ffmpeg.sh arm64

      - name: Compile ijkplayer arm64
        run: |
          cd ijk-player/android
          ./compile-ijk.sh arm64

      - name: Find ALL .so files and show locations
        run: |
          echo "=== Searching for all .so files ==="
          find . -name "*.so" -type f -exec ls -lh {} \; 2>/dev/null
          
          echo ""
          echo "=== Common locations to check ==="
          ls -la ijk-player/android/ijkplayer/ijkplayer-arm64/src/main/libs/arm64-v8a/ 2>/dev/null || echo "Not in ijkplayer-arm64"
          ls -la ijk-player/android/ijkplayer/ijkplayer-armv7a/src/main/libs/ 2>/dev/null || echo "Not in armv7a"
          ls -la ijk-player/android/ijkplayer/build/intermediates/ 2>/dev/null || echo "Not in build/intermediates"
          ls -la ijk-player/android/ijkplayer/ijkplayer/build/outputs/ 2>/dev/null || echo "Not in build/outputs"
          
      - name: Upload everything we find
        uses: actions/upload-artifact@v4
        with:
          name: all-so-files
          path: "**/*.so"
          retention-days: 7
